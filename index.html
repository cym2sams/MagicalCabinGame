<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>數學遊戲：森林裡的奇妙小屋 v1.3</title>
    <style>
        /* --- 版本 1.3 CSS 改動 --- */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            --bg-color: #F8F4E6; /* 柔和米白 */
            --cabin-frame-color: #8B4513; /* 鞍褐色 */
            --cabin-inner-color: #F5DEB3; /* 小麥色 */
            --button-color: #5CB85C; /* 活力綠 */
            --highlight-color: #FFD700; /* 金色 */
            --emphasis-color: #D9534F; /* 番茄紅 */
            --font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--cabin-frame-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 防止在 iPad 上拖動時滾動頁面 */
        }

        /* 2. 遊戲主容器 */
        .game-container {
            width: 95%;
            max-width: 800px;
            height: 95vh;
            max-height: 1000px;
            background: linear-gradient(145deg, #ffffff, #e6e2d6);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 5px solid var(--cabin-frame-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* 3. 頂部佈局：標題、狀態列 */
        header {
            text-align: center;
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
        }

        .status-bar {
            display: flex;
            justify-content: space-around;
            font-size: 2em;
            font-weight: bold;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        /* 4. 指令區 */
        .instruction-area {
            text-align: center;
            font-size: 2.2em;
            font-weight: bold;
            padding: 15px;
            min-height: 80px;
        }

        .instruction-area .emoji {
            font-size: 1.2em;
            vertical-align: middle;
        }

        /* 5. 遊戲核心區：小屋 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            flex-grow: 1;
            background-color: var(--cabin-frame-color);
            border: 10px solid var(--cabin-frame-color);
            border-radius: 15px;
            padding: 10px;
        }

        .grid-cell {
            background-color: var(--cabin-inner-color);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em; /* 格子內 emoji 大小 */
            user-select: none;
            position: relative;
        }
        
        .emoji {
            cursor: grab;
            user-select: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .emoji.dragging {
            opacity: 0.5;
            cursor: grabbing;
            position: absolute; /* 確保拖動時在最上層 */
            z-index: 1000;
        }

        .emoji.immobile {
            cursor: not-allowed;
        }

        /* 6. 可拖動物件區 */
        .draggable-object-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 120px;
        }

        #draggable-emoji-container {
             /* 移除 width 和 height */
             padding: 10px; /* 增加內邊距 */
             display: flex;
             justify-content: center;
             align-items: center;
             border: 3px dashed var(--cabin-frame-color); /* 邊框樣式 */
             border-radius: 10px;
             background-color: #FFF8E1; /* 新增背景色 */
        }
        
        #draggable-emoji-container .emoji {
            font-size: 4.5em; /* 再次調整大小 */
            line-height: 1; /* 確保垂直居中 */
        }

        /* 7. 遊戲覆蓋層 (開始/結束畫面) */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(248, 244, 230, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .game-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #end-message {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-button {
            font-family: var(--font-family);
            font-size: 2.5em;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 15px;
            border: none;
            background-color: var(--button-color);
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        .game-button:hover {
            transform: scale(1.05);
            background-color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1>森林裡的奇妙小屋</h1>
        </header>

        <div class="status-bar">
            <div id="timer">遊戲時間: 60</div>
            <div id="score">分數: 0</div>
        </div>

        <div class="instruction-area" id="instruction-text">
            <!-- 指令會在這裡生成 -->
        </div>

        <div class="game-grid" id="game-grid">
            <!-- 4x3 的格子會在這裡生成 -->
        </div>

        <div class="draggable-object-area">
            <div id="draggable-emoji-container">
                 <!-- 可拖動的 emoji 會在這裡生成 -->
            </div>
        </div>
    </div>
    
    <div class="game-overlay" id="start-screen">
        <button class="game-button" id="start-button">開始遊戲</button>
    </div>

    <div class="game-overlay hidden" id="end-screen">
        <h2 id="end-title">時間到！</h2>
        <p id="end-message">你的最終成績是...</p>
        <button class="game-button" id="replay-button">再玩一次</button>
    </div>


    <script>
    // --- 版本 1.3 --- (JavaScript 部分與 v1.1 完全相同)
    
    // --- 1-4. DOM 元素, 設定, 資源, 音效 ---
    const gameGrid = document.getElementById('game-grid');
    const instructionText = document.getElementById('instruction-text');
    const draggableContainer = document.getElementById('draggable-emoji-container');
    const timerDisplay = document.getElementById('timer');
    const scoreDisplay = document.getElementById('score');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const startButton = document.getElementById('start-button');
    const replayButton = document.getElementById('replay-button');
    const endMessage = document.getElementById('end-message');
    const GRID_ROWS = 3;
    const GRID_COLS = 4;
    const TOTAL_TIME = 60;
    let score = 0, timer = TOTAL_TIME, timerInterval;
    const TARGET_EMOJIS = ['🍎', '🍊', '🍋', '🍐', '🍏', '🥭', '🥥', '🍅'];
    const DISTRACTOR_EMOJIS = ['🍌', '🍓', '🍇', '🍍', '🍉', '🥝', '🍑', '🍒', '🍆', '🥕'];
    const QUESTION_TYPES = [
        { type: 'above', text: '在 ... 的上面' }, { type: 'below', text: '在 ... 的下面' },
        { type: 'left',  text: '在 ... 的左面' }, { type: 'right', text: '在 ... 的右面' },
    ];
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) { 
        if (!audioContext) return;
        if (audioContext.state === 'suspended') { audioContext.resume(); }
        const o = audioContext.createOscillator(), g = audioContext.createGain();
        o.connect(g); g.connect(audioContext.destination);
        switch (type) {
            case 'click': o.type = 'sine'; o.frequency.setValueAtTime(440, audioContext.currentTime); g.gain.setValueAtTime(0.5, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); break;
            case 'correct': o.type = 'triangle'; o.frequency.setValueAtTime(523.25, audioContext.currentTime); o.frequency.linearRampToValueAtTime(1046.50, audioContext.currentTime + 0.15); g.gain.setValueAtTime(0.3, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); break;
            case 'wrong': o.type = 'square'; o.frequency.setValueAtTime(220, audioContext.currentTime); g.gain.setValueAtTime(0.3, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3); break;
            case 'tick': o.type = 'sine'; o.frequency.setValueAtTime(880, audioContext.currentTime); g.gain.setValueAtTime(0.2, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1); break;
            case 'gameOver': o.type = 'sawtooth'; o.frequency.setValueAtTime(440, audioContext.currentTime); o.frequency.linearRampToValueAtTime(220, audioContext.currentTime + 0.5); g.gain.setValueAtTime(0.4, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5); break;
        }
        o.start(); o.stop(audioContext.currentTime + 0.5);
    }

    // --- 5. 遊戲流程控制 ---
    function startGame() { 
        playSound('click'); startScreen.classList.add('hidden'); endScreen.classList.add('hidden');
        score = 0; timer = TOTAL_TIME; updateStatus();
        generateQuestion();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timer--; updateStatus();
            if (timer <= 5 && timer > 0) playSound('tick');
            if (timer <= 0) endGame();
        }, 1000);
    }
    function endGame() { 
        clearInterval(timerInterval); playSound('gameOver');
        const correctAnswers = score / 10;
        endMessage.innerHTML = `你在 ${TOTAL_TIME} 秒內答對了 ${correctAnswers} 題，<br>總分是 ${score}！`;
        gameGrid.innerHTML = ''; instructionText.innerHTML = ''; draggableContainer.innerHTML = '';
        endScreen.classList.remove('hidden');
    }
    function updateStatus() { 
        timerDisplay.textContent = `遊戲時間: ${timer}`; scoreDisplay.textContent = `分數: ${score}`;
    }

    // --- 6. 題目生成邏輯 ---
    function generateQuestion() {
        gameGrid.innerHTML = '';
        draggableContainer.innerHTML = '';
        
        const currentQuestion = QUESTION_TYPES[Math.floor(Math.random() * QUESTION_TYPES.length)];
        let [subjectEmoji, anchorEmoji] = getRandomItems(TARGET_EMOJIS, 2);

        let anchorRow, anchorCol, anchorIndex;
        let possibleSolutionCells = [];
        
        while(possibleSolutionCells.length === 0) {
            do {
                anchorRow = Math.floor(Math.random() * GRID_ROWS);
                anchorCol = Math.floor(Math.random() * GRID_COLS);
            } while (!isValidAnchorPosition(anchorRow, anchorCol, currentQuestion.type));
            
            anchorIndex = anchorRow * GRID_COLS + anchorCol;

            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    const isSolution = checkAnswerLogic(r, c, anchorRow, anchorCol, currentQuestion.type);
                    if (isSolution) {
                        possibleSolutionCells.push(r * GRID_COLS + c);
                    }
                }
            }
        }
        
        const solutionIndex = possibleSolutionCells[Math.floor(Math.random() * possibleSolutionCells.length)];

        let availableSpots = [];
        for (let i = 0; i < GRID_ROWS * GRID_COLS; i++) {
            if (i !== anchorIndex && i !== solutionIndex) {
                availableSpots.push(i);
            }
        }
        shuffleArray(availableSpots);

        const gridState = Array(GRID_ROWS * GRID_COLS).fill(null);
        gridState[anchorIndex] = anchorEmoji;

        let distractorCount = Math.floor(Math.random() * 3) + 3;
        const availableDistractors = getRandomItems(DISTRACTOR_EMOJIS, distractorCount);
        for (let i = 0; i < distractorCount; i++) {
            const spot = availableSpots.pop();
            if (spot !== undefined) {
                gridState[spot] = availableDistractors[i];
            }
        }

        for (let i = 0; i < gridState.length; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            cell.dataset.row = Math.floor(i / GRID_COLS);
            cell.dataset.col = i % GRID_COLS;
            
            if (gridState[i]) {
                const emojiSpan = document.createElement('span');
                emojiSpan.classList.add('emoji', 'immobile');
                emojiSpan.textContent = gridState[i];
                if (i === anchorIndex) {
                    cell.dataset.anchor = 'true';
                }
                cell.appendChild(emojiSpan);
            }
            gameGrid.appendChild(cell);
        }
        
        instructionText.innerHTML = `<span class="emoji">${subjectEmoji}</span> ${currentQuestion.text.replace('...', `<span class="emoji">${anchorEmoji}</span>`)}`;

        const draggableEmoji = createDraggableEmoji(subjectEmoji, currentQuestion);
        draggableContainer.appendChild(draggableEmoji);
    }
    
    // --- 7. 拖放邏輯 ---
    let draggedElement = null;
    function createDraggableEmoji(emoji, question) { 
        const element = document.createElement('span');
        element.textContent = emoji; element.classList.add('emoji'); element.draggable = true;
        element.dataset.questionType = question.type;
        element.addEventListener('dragstart', handleDragStart);
        element.addEventListener('touchstart', handleTouchStart, { passive: false });
        return element;
    }
    function handleDragStart(e) { draggedElement = e.target; setTimeout(() => { if(draggedElement) draggedElement.style.visibility = 'hidden'; }, 0); }
    function handleDragEnd() { if(draggedElement) draggedElement.style.visibility = 'visible'; draggedElement = null; }
    function handleTouchStart(e) { e.preventDefault(); draggedElement = e.target; draggedElement.classList.add('dragging'); const touch = e.touches[0]; draggedElement.style.position = 'absolute'; draggedElement.style.pointerEvents = 'none'; document.addEventListener('touchmove', handleTouchMove, { passive: false }); document.addEventListener('touchend', handleTouchEnd); handleTouchMove(e); }
    function handleTouchMove(e) { e.preventDefault(); if (!draggedElement) return; const touch = e.touches[0]; draggedElement.style.left = (touch.pageX - draggedElement.offsetWidth / 2) + 'px'; draggedElement.style.top = (touch.pageY - draggedElement.offsetHeight / 2) + 'px'; }
    function handleTouchEnd(e) { if (!draggedElement) return; draggedElement.style.visibility = 'hidden'; const touch = e.changedTouches[0]; const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY); handleDrop(dropTarget); draggedElement.style.position = ''; draggedElement.style.left = ''; draggedElement.style.top = ''; draggedElement.style.pointerEvents = 'auto'; draggedElement.style.visibility = 'visible'; draggedElement.classList.remove('dragging'); document.removeEventListener('touchmove', handleTouchMove); document.removeEventListener('touchend', handleTouchEnd); draggedElement = null; }
    function handleDrop(target) {
        const cell = target ? target.closest('.grid-cell') : null;
        if (cell && !cell.hasChildNodes()) {
            if (checkAnswer(cell)) {
                playSound('correct'); score += 10; updateStatus();
                const tempEmoji = draggedElement.cloneNode(true); tempEmoji.classList.remove('dragging'); cell.appendChild(tempEmoji);
                if (draggedElement.parentElement) { draggedElement.parentElement.removeChild(draggedElement); }
                setTimeout(generateQuestion, 400);
            } else { playSound('wrong'); }
        } else { playSound('wrong'); }
    }
    
    // --- 8. 答案判斷邏輯 ---
    function checkAnswerLogic(droppedRow, droppedCol, anchorRow, anchorCol, questionType) {
        switch (questionType) {
            case 'above': return droppedCol === anchorCol && droppedRow < anchorRow;
            case 'below': return droppedCol === anchorCol && droppedRow > anchorRow;
            case 'left': return droppedRow === anchorRow && droppedCol < anchorCol;
            case 'right': return droppedRow === anchorRow && droppedCol > anchorCol;
            default: return false;
        }
    }
    function checkAnswer(droppedCell) {
        if (!draggedElement) return false;
        const droppedRow = parseInt(droppedCell.dataset.row);
        const droppedCol = parseInt(droppedCell.dataset.col);
        const anchorCell = gameGrid.querySelector('[data-anchor="true"]');
        const anchorRow = parseInt(anchorCell.dataset.row);
        const anchorCol = parseInt(anchorCell.dataset.col);
        const questionType = draggedElement.dataset.questionType;
        return checkAnswerLogic(droppedRow, droppedCol, anchorRow, anchorCol, questionType);
    }
    
    // --- 9. 輔助工具函數 ---
    function getRandomItems(arr, n) { const shuffled = [...arr].sort(() => 0.5 - Math.random()); return shuffled.slice(0, n); }
    function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }
    function isValidAnchorPosition(row, col, type) {
        switch (type) {
            case 'above': return row > 0;
            case 'below': return row < GRID_ROWS - 1;
            case 'left':  return col > 0;
            case 'right': return col < GRID_COLS - 1;
            default: return true;
        }
    }
    
    // --- 10. 事件綁定 ---
    startButton.addEventListener('click', startGame);
    replayButton.addEventListener('click', startGame);
    </script>
</body>
</html>
