<body>
    <div id="game-wrapper">
        <div id="start-screen" class="screen"><div class="modal"><h1 class="welcome-title">森林裡的奇妙小屋</h1><div class="input-group"><label for="class-select">班別:</label><select id="class-select"><option value="">-- 請選擇 --</option><option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="1D">1D</option></select></div><div class="input-group"><label for="student-id-select">學號:</label><select id="student-id-select"><option value="">-- 請選擇 --</option></select></div><br><button id="start-button" disabled>開始遊戲</button></div></div>

    <script>
        const startScreen = document.getElementById('start-screen'); const rulesScreen = document.getElementById('rules-screen'); const gameScreen = document.getElementById('game-screen'); const endScreen = document.getElementById('end-screen'); const readyButton = document.getElementById('ready-button'); const feedbackIcon = document.getElementById('feedback-icon'); const classSelect = document.getElementById('class-select'); const studentIdSelect = document.getElementById('student-id-select'); const startButton = document.getElementById('start-button'); const timerText = document.getElementById('timer-text'); const scoreText = document.getElementById('score-text'); const instructionText = document.getElementById('instruction-text'); const cabinetGrid = document.getElementById('cabinet-grid'); const draggableEmoji = document.getElementById('draggable-emoji'); const finalScoreText = document.getElementById('final-score-text'); const yourRankText = document.getElementById('your-rank-text'); const leaderboardList = document.getElementById('leaderboard-list'); const playAgainButton = document.getElementById('play-again-button'); const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        document.addEventListener('DOMContentLoaded', () => { for (let i = 1; i <= 25; i++) { const option = document.createElement('option'); option.value = i; option.textContent = i; studentIdSelect.appendChild(option); } showScreen('start-screen'); });
        function playSound(type) { const oscillator = audioContext.createOscillator(); const gainNode = audioContext.createGain(); oscillator.connect(gainNode); gainNode.connect(audioContext.destination); if (type === 'correct') { oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(600, audioContext.currentTime); gainNode.gain.setValueAtTime(0.5, audioContext.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5); } else if (type === 'wrong') { oscillator.type = 'square'; oscillator.frequency.setValueAtTime(150, audioContext.currentTime); gainNode.gain.setValueAtTime(0.3, audioContext.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); } else if (type === 'tick') { oscillator.type = 'triangle'; oscillator.frequency.setValueAtTime(1000, audioContext.currentTime); gainNode.gain.setValueAtTime(0.1, audioContext.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1); } else { oscillator.type = 'triangle'; oscillator.frequency.setValueAtTime(800, audioContext.currentTime); gainNode.gain.setValueAtTime(0.2, audioContext.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1); } oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.5); }
        document.querySelectorAll('button').forEach(button => { button.addEventListener('click', () => playSound('click')); });
        const GAME_TIME = 60; const ALL_EMOJIS = ["🍎", "🍊", "🍐", "🍓", "🍇", "🍌", "🍍"]; const DIRECTIONS = { above: "上面", below: "下面", left: "左面", right: "右面", }; const ALL_QUESTION_TYPES = [...Object.keys(DIRECTIONS), "between"]; let timer, score = 0, remainingTime = GAME_TIME; let currentAnswerEmoji, currentAnchorEmoji, currentAnchorEmoji2; let currentQuestionType; let currentAnchorPos = { row: 0, col: 0 }; let currentAnchorPos2 = { row: 0, col: 0 };

        classSelect.addEventListener('change', checkSelections); studentIdSelect.addEventListener('change', checkSelections);
        function showScreen(screenId) { document.querySelectorAll('.screen').forEach(screen => { screen.classList.add('hidden'); }); const screenToShow = document.getElementById(screenId); if (screenToShow) { screenToShow.classList.remove('hidden'); } }
        startButton.addEventListener('click', () => { showScreen('rules-screen'); });
        readyButton.addEventListener('click', () => { showScreen('game-screen'); startGame(); });
        playAgainButton.addEventListener('click', () => { showScreen('start-screen'); });
        function startGame() { score = 0; remainingTime = GAME_TIME; scoreText.textContent = `分數: ${score}`; timerText.textContent = `⏱️ 時間: ${remainingTime}`; timerText.classList.remove('warning'); timer = setInterval(() => { remainingTime--; timerText.textContent = `⏱️ 時間: ${remainingTime}`; if (remainingTime <= 10) { timerText.classList.add('warning'); playSound('tick'); } if (remainingTime <= 0) { clearInterval(timer); endGame(); } }, 1000); generateQuestion(); }
        function endGame() { showScreen('end-screen'); finalScoreText.textContent = `你的總分是：${score}`; updateLeaderboard(); }
        function generateQuestion() { cabinetGrid.innerHTML = ''; currentQuestionType = ALL_QUESTION_TYPES[Math.floor(Math.random() * ALL_QUESTION_TYPES.length)]; let emojis = [...ALL_EMOJIS].sort(() => 0.5 - Math.random()); const gridContent = new Map(); const reservedCells = new Set(); if (currentQuestionType === 'between') { currentAnswerEmoji = emojis[0]; currentAnchorEmoji = emojis[1]; currentAnchorEmoji2 = emojis[2]; let answerCell; if (Math.random() > 0.5) { const r = Math.floor(Math.random() * 4); const c1 = Math.floor(Math.random() * 2); const c2 = c1 + 2; currentAnchorPos = { row: r, col: c1 }; currentAnchorPos2 = { row: r, col: c2 }; answerCell = `${r},${c1 + 1}`; } else { const c = Math.floor(Math.random() * 4); const r1 = Math.floor(Math.random() * 2); const r2 = r1 + 2; currentAnchorPos = { row: r1, col: c }; currentAnchorPos2 = { row: r2, col: c }; answerCell = `${r1 + 1},${c}`; } gridContent.set(`${currentAnchorPos.row},${currentAnchorPos.col}`, currentAnchorEmoji); gridContent.set(`${currentAnchorPos2.row},${currentAnchorPos2.col}`, currentAnchorEmoji2); reservedCells.add(`${currentAnchorPos.row},${currentAnchorPos.col}`); reservedCells.add(`${currentAnchorPos2.row},${currentAnchorPos2.col}`); reservedCells.add(answerCell); instructionText.textContent = `${currentAnswerEmoji} 在 ${currentAnchorEmoji} 和 ${currentAnchorEmoji2} 之間`; } else { currentAnchorEmoji = emojis[0]; currentAnswerEmoji = emojis[1]; let potentialTargets; do { currentAnchorPos.row = Math.floor(Math.random() * 4); currentAnchorPos.col = Math.floor(Math.random() * 4); potentialTargets = getPotentialTargets(); } while (potentialTargets.length === 0); gridContent.set(`${currentAnchorPos.row},${currentAnchorPos.col}`, currentAnchorEmoji); reservedCells.add(`${currentAnchorPos.row},${currentAnchorPos.col}`); potentialTargets.forEach(pos => reservedCells.add(pos)); if (Math.random() > 0.5) { instructionText.textContent = `${currentAnchorEmoji} 的 ${DIRECTIONS[currentQuestionType]} 是 ${currentAnswerEmoji}`; } else { instructionText.textContent = `${currentAnswerEmoji} 在 ${currentAnchorEmoji} 的 ${DIRECTIONS[currentQuestionType]}`; } } const emptyCellCount = 9; let allCellPositions = []; for (let r = 0; r < 4; r++) { for (let c = 0; c < 4; c++) { allCellPositions.push(`${r},${c}`); } } let availableForInterference = allCellPositions.filter(pos => !reservedCells.has(pos)); availableForInterference.sort(() => 0.5 - Math.random()); const interferenceCount = Math.max(0, 16 - reservedCells.size - emptyCellCount); let interferenceEmojis = emojis.filter(e => e !== currentAnswerEmoji && e !== currentAnchorEmoji && e !== currentAnchorEmoji2); for(let i = 0; i < interferenceCount && i < availableForInterference.length; i++) { gridContent.set(availableForInterference[i], interferenceEmojis[i % interferenceEmojis.length]); } for (let r = 0; r < 4; r++) { for (let c = 0; c < 4; c++) { const cell = document.createElement('div'); cell.classList.add('cabinet-cell'); cell.dataset.row = r; cell.dataset.col = c; const posId = `${r},${c}`; if (gridContent.has(posId)) { cell.textContent = gridContent.get(posId); } cabinetGrid.appendChild(cell); } } draggableEmoji.textContent = currentAnswerEmoji; }
        function getPotentialTargets() { const targets = []; const { row, col } = currentAnchorPos; switch(currentQuestionType) { case 'above': for (let r = 0; r < row; r++) targets.push(`${r},${col}`); break; case 'below': for (let r = row + 1; r < 4; r++) targets.push(`${r},${col}`); break; case 'left':  for (let c = 0; c < col; c++) targets.push(`${row},${c}`); break; case 'right': for (let c = col + 1; c < 4; c++) targets.push(`${row},${c}`); break; } return targets; }
        function showFeedback(isCorrect) { if (isCorrect) { feedbackIcon.textContent = '✅'; feedbackIcon.style.color = '#76C7C0'; } else { feedbackIcon.textContent = '❌'; feedbackIcon.style.color = '#E57373'; } feedbackIcon.classList.add('show'); setTimeout(() => { feedbackIcon.classList.remove('show'); }, 600); }
        function checkAnswer(droppedRow, droppedCol) { let isCorrect = false; if (currentQuestionType === 'between') { const r1 = Math.min(currentAnchorPos.row, currentAnchorPos2.row); const r2 = Math.max(currentAnchorPos.row, currentAnchorPos2.row); const c1 = Math.min(currentAnchorPos.col, currentAnchorPos2.col); const c2 = Math.max(currentAnchorPos.col, currentAnchorPos2.col); isCorrect = (droppedRow > r1 && droppedRow < r2) || (droppedCol > c1 && droppedCol < c2); } else { const { row: anchorRow, col: anchorCol } = currentAnchorPos; switch(currentQuestionType) { case 'above': isCorrect = (droppedCol === anchorCol && droppedRow < anchorRow); break; case 'below': isCorrect = (droppedCol === anchorCol && droppedRow > anchorRow); break; case 'left': isCorrect = (droppedRow === anchorRow && droppedCol < anchorCol); break; case 'right': isCorrect = (droppedRow === anchorRow && droppedCol > anchorCol); break; } } showFeedback(isCorrect); if (isCorrect) { playSound('correct'); score += 10; scoreText.textContent = `分數: ${score}`; setTimeout(generateQuestion, 500); } else { playSound('wrong'); draggableEmoji.style.animation = 'shake 0.5s'; setTimeout(() => { draggableEmoji.style.animation = ''; }, 500); } }
        let touchDragGhost = null;
        draggableEmoji.addEventListener('touchstart', (e) => { e.preventDefault(); touchDragGhost = draggableEmoji.cloneNode(true); touchDragGhost.classList.add('touch-drag-ghost'); document.body.appendChild(touchDragGhost); const touch = e.touches[0]; moveGhost(touch.clientX, touch.clientY); draggableEmoji.style.opacity = '0.5'; }, { passive: false });
        document.addEventListener('touchmove', (e) => { if (!touchDragGhost) return; e.preventDefault(); const touch = e.touches[0]; moveGhost(touch.clientX, touch.clientY); }, { passive: false });
        document.addEventListener('touchend', (e) => { if (!touchDragGhost) return; const touch = e.changedTouches[0]; const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY); const targetCell = dropTarget ? dropTarget.closest('.cabinet-cell') : null; if (targetCell) { const droppedRow = parseInt(targetCell.dataset.row); const droppedCol = parseInt(targetCell.dataset.col); if (!targetCell.textContent.trim()) { checkAnswer(droppedRow, droppedCol); } } document.body.removeChild(touchDragGhost); touchDragGhost = null; draggableEmoji.style.opacity = '1'; });
        function moveGhost(x, y) { if (!touchDragGhost) return; touchDragGhost.style.left = `${x - (touchDragGhost.offsetWidth / 2)}px`; touchDragGhost.style.top = `${y - (touchDragGhost.offsetHeight / 2)}px`; }
        draggableEmoji.addEventListener('dragstart', (e) => { e.target.classList.add('dragging'); });
        draggableEmoji.addEventListener('dragend', (e) => { e.target.classList.remove('dragging'); });
        cabinetGrid.addEventListener('dragover', (e) => { e.preventDefault(); });
        cabinetGrid.addEventListener('drop', (e) => { e.preventDefault(); const targetCell = e.target.closest('.cabinet-cell'); if (targetCell) { const droppedRow = parseInt(targetCell.dataset.row); const droppedCol = parseInt(targetCell.dataset.col); if (!targetCell.textContent.trim()) { checkAnswer(droppedRow, droppedCol); } } });
        const styleSheet = document.createElement("style"); styleSheet.innerText = `@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { translateX(5px); } }`; document.head.appendChild(styleSheet);
        function updateLeaderboard() { const playerId = `${classSelect.value}-${studentIdSelect.value}`; let leaderboard = JSON.parse(localStorage.getItem('mathGameLeaderboard')) || []; const playerIndex = leaderboard.findIndex(record => record.id === playerId); if (playerIndex > -1) { if (score > leaderboard[playerIndex].score) { leaderboard[playerIndex].score = score; } } else { leaderboard.push({ id: playerId, score: score }); } leaderboard.sort((a, b) => b.score - a.score); localStorage.setItem('mathGameLeaderboard', JSON.stringify(leaderboard)); leaderboardList.innerHTML = ''; let rank = -1; leaderboard.forEach((record, index) => { const li = document.createElement('li'); li.innerHTML = `<span>${index + 1}. ${record.id}</span> <span>${record.score}分</span>`; if (record.id === playerId) { rank = index + 1; li.classList.add('current-player'); } leaderboardList.appendChild(li); }); yourRankText.textContent = rank !== -1 ? `🎉 你的排名：第 ${rank} 名 🎉` : '未上榜'; }
