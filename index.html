<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>數學遊戲：位置猜猜猜 v2.2</title>
    <style>
        /* --- 版本 2.2 CSS 響應式與細節改良 --- */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { font-size: 2.2vmin; /* ...其他變數與v2.1相同... */ --bg-color: #F8F4E6; --cabin-frame-color: #8B4513; --cabin-inner-color: #F5DEB3; --button-color: #5CB85C; --highlight-color: #FFD700; --emphasis-color: #D9534F; --font-family: 'Noto Sans TC', sans-serif; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--cabin-frame-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        .game-container { position: relative; /* 為了讓 feedback-overlay 正確定位 */ width: 95%; height: 95%; max-width: 100vh; max-height: 100vw; background: linear-gradient(145deg, #ffffff, #e6e2d6); border-radius: 20px; box-shadow: 0 1rem 3rem rgba(0,0,0,0.15); border: 0.5rem solid var(--cabin-frame-color); display: flex; flex-direction: column; padding: 2rem; box-sizing: border-box; }
        header { text-align: center; padding-bottom: 1rem; }
        h1 { margin: 0; font-size: 2.5rem; }
        .status-bar { display: flex; justify-content: space-around; font-size: 1.8rem; font-weight: bold; padding: 1rem; background-color: rgba(255, 255, 255, 0.5); border-radius: 1rem; margin-bottom: 1rem; }
        .instruction-area { text-align: center; font-size: 2rem; font-weight: bold; padding: 1rem; min-height: 4rem; display:flex; justify-content: center; align-items: center;}
        .instruction-area .emoji { font-size: 1.2em; vertical-align: middle; margin: 0 0.5rem; }
        
        /* 直向佈局優化 */
        .main-game-area { display: flex; flex-direction: column; flex-grow: 1; gap: 0.5rem; /* 減小格子與拖動區的間距 */ }
        .draggable-object-area { display: flex; justify-content: center; align-items: center; padding: 0.5rem; min-height: 8rem; /* 減小最小高度 */ }
        #draggable-emoji-container .emoji { font-size: 4.2rem; /* 縮小水果 */ line-height: 1; }

        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1rem; flex-grow: 1; background-color: var(--cabin-frame-color); border: 1rem solid var(--cabin-frame-color); border-radius: 1.5rem; padding: 1rem; }
        .grid-cell { background-color: var(--cabin-inner-color); border-radius: 1rem; display: flex; justify-content: center; align-items: center; font-size: 3rem; user-select: none; position: relative; }
        .emoji { cursor: grab; user-select: none; text-shadow: 0.2rem 0.2rem 0.4rem rgba(0,0,0,0.2); }
        .emoji.dragging { opacity: 0.5; cursor: grabbing; position: absolute; z-index: 1000; }
        .emoji.immobile { cursor: not-allowed; }
        #draggable-emoji-container { padding: 1rem; display: flex; justify-content: center; align-items: center; border: 0.3rem dashed var(--cabin-frame-color); border-radius: 1rem; background-color: #FFF8E1; }
        
        /* 其他覆蓋層樣式... */
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(248, 244, 230, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 100; transition: opacity 0.5s; padding: 2rem; box-sizing: border-box; }
        .game-overlay.hidden { opacity: 0; pointer-events: none; }
        
        /* 新增：答題回饋樣式 */
        .feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.1); backdrop-filter: blur(2px); z-index: 150; /* 比一般覆蓋層更高 */ display: flex; justify-content: center; align-items: center; }
        .feedback-icon { font-size: 15rem; font-weight: bold; text-shadow: 0 0 2rem rgba(0,0,0,0.3); animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feedback-icon.correct { color: #28a745; }
        .feedback-icon.wrong { color: #dc3545; }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ...其他登入/結束畫面樣式與 v2.1 相同... */
        .game-overlay h2 { font-size: 3rem; margin-bottom: 2rem; } .game-overlay p { font-size: 1.5rem; max-width: 60rem; line-height: 1.6; } .login-form { display: flex; flex-direction: column; gap: 2rem; font-size: 1.8rem; } .form-group { display: flex; flex-direction: column; align-items: flex-start; } .form-group label { margin-bottom: 0.5rem; font-weight: bold; } .form-group select { font-size: 1em; padding: 1rem; border-radius: 0.8rem; border: 0.2rem solid var(--cabin-frame-color); width: 30rem; font-family: var(--font-family); } #login-error { color: var(--emphasis-color); font-weight: bold; height: 2rem; } #leaderboard-container { width: 90%; max-width: 60rem; margin-top: 2rem; max-height: 40vh; overflow-y: auto; } .leaderboard { width: 100%; border-collapse: collapse; font-size: 1.2rem; } .leaderboard th, .leaderboard td { padding: 1rem; text-align: center; border-bottom: 0.2rem solid var(--cabin-inner-color); } .leaderboard th { background-color: var(--cabin-frame-color); color: var(--bg-color); } .leaderboard tr.current-player { background-color: var(--highlight-color) !important; font-weight: bold; } .game-button { font-family: var(--font-family); font-size: 2rem; font-weight: bold; padding: 1.5rem 4rem; border-radius: 1.5rem; border: none; background-color: var(--button-color); color: white; cursor: pointer; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.2); transition: transform 0.2s; margin-top: 2rem; } .game-button:hover { transform: scale(1.05); }

        /* 橫向模式媒體查詢 */
        @media (orientation: landscape) {
            :root { font-size: 2vh; }
            .game-container { padding: 1.5rem; justify-content: flex-start; /* 讓內容從頂部開始排列 */ }
            header { padding-bottom: 0.5rem; flex-shrink: 0; /* 防止 header 被壓縮 */ }
            h1 { font-size: 2rem; }
            .status-bar, .instruction-area { font-size: 1.5rem; padding: 0.5rem; margin-bottom: 0.5rem; min-height: auto; flex-shrink: 0; }
            .main-game-area { flex-direction: row; align-items: center; }
            .draggable-object-area { min-height: auto; padding: 2rem; }
        }
    </style>
</head>
<body>
    <!-- *** 版本 2.2 HTML 結構微調 *** -->
    <div class="game-container" id="game-main-interface" style="display:none;">
        <header><h1>位置猜猜猜</h1></header>
        <div class="status-bar"><div id="timer">遊戲時間: 60</div><div id="score">分數: 0</div></div>
        <div class="instruction-area" id="instruction-text"></div>
        <div class="main-game-area">
            <div class="game-grid" id="game-grid"></div>
            <div class="draggable-object-area"><div id="draggable-emoji-container"></div></div>
        </div>
        <!-- 新增的回饋層 -->
        <div class="feedback-overlay hidden" id="feedback-overlay">
            <div class="feedback-icon" id="feedback-icon"></div>
        </div>
    </div>
    <!-- 其他 HTML 覆蓋層與 v2.1 相同 -->
    <div class="game-overlay" id="login-screen"><h2>歡迎來到奇妙小屋</h2><div class="login-form"><div class="form-group"><label for="class-select">選擇班別:</label><select id="class-select"><option value="">請選擇...</option><option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="1D">1D</option></select></div><div class="form-group"><label for="student-id-select">選擇學號:</label><select id="student-id-select"><option value="">請選擇...</option></select></div></div><div id="login-error"></div><button class="game-button" id="login-button">確定</button></div>
    <div class="game-overlay hidden" id="instruction-screen"><h2>遊戲規則</h2><p>在 60 秒內，根據上方的指令，將下方的水果拖到小屋中正確的位置。答對加 10 分並進入下一題，答錯會彈回原位，直到答對為止。看看你有多快！</p><button class="game-button" id="ready-button">準備好了！</button></div>
    <div class="game-overlay hidden" id="end-screen"><h2>時間到！</h2><p id="end-message"></p><div id="leaderboard-container"></div><button class="game-button" id="replay-button">再玩一次</button></div>

    <script>
    // --- 版本 2.2 ---
    
    // 1. DOM 元素獲取 (新增 feedback 相關元素)
    const feedbackOverlay = document.getElementById('feedback-overlay');
    const feedbackIcon = document.getElementById('feedback-icon');
    // ... 其他元素與 v2.1 相同
    const gameMainInterface = document.getElementById('game-main-interface'), loginScreen = document.getElementById('login-screen'), instructionScreen = document.getElementById('instruction-screen'), endScreen = document.getElementById('end-screen'), classSelect = document.getElementById('class-select'), studentIdSelect = document.getElementById('student-id-select'), loginButton = document.getElementById('login-button'), loginError = document.getElementById('login-error'), readyButton = document.getElementById('ready-button'), replayButton = document.getElementById('replay-button'), timerDisplay = document.getElementById('timer'), scoreDisplay = document.getElementById('score'), instructionText = document.getElementById('instruction-text'), gameGrid = document.getElementById('game-grid'), draggableContainer = document.getElementById('draggable-emoji-container'), endMessage = document.getElementById('end-message'), leaderboardContainer = document.getElementById('leaderboard-container');

    // 2-6. 核心設定, 資源, 音效, 流程, 排行榜 (與 v2.1 相同)
    const GRID_ROWS = 3, GRID_COLS = 4, TOTAL_TIME = 60; let score = 0, timer = TOTAL_TIME, timerInterval, currentUser = null;
    const TARGET_EMOJIS = ['🍎', '🍊', '🍋', '🍐', '🍏', '🥭', '🥥', '🍅', '🥝', '🍑']; const DISTRACTOR_EMOJIS = ['🍌', '🍓', '🍇', '🍍', '🍉', '🍒', '🍆', '🥕', '🌽', '🥦'];
    const QUESTION_TYPES = [ { type: 'above', format: 'S_V_O' }, { type: 'below', format: 'S_V_O' }, { type: 'left',  format: 'S_V_O' }, { type: 'right', format: 'S_V_O' }, { type: 'above', format: 'O_V_S' }, { type: 'below', format: 'O_V_S' }, { type: 'left',  format: 'O_V_S' }, { type: 'right', format: 'O_V_S' }, { type: 'between', format: 'S_V_O' }];
    const TEXT_MAP = { above: '上面', below: '下面', left: '左面', right: '右面', between: '之間' };
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) { /* ... */ } function populateStudentIds() { /* ... */ } function handleLogin() { /* ... */ } function startGame() { /* ... */ } function endGame() { /* ... */ } function replayGame() { /* ... */ } function updateStatus() { /* ... */ } function saveScore(className, studentId, score) { /* ... */ } function getLeaderboard() { /* ... */ } function displayLeaderboard() { /* ... */ }
    // --- 完整實現 (與 v2.1 相同) ---
    function playSound(type) { if (!audioContext) return; if (audioContext.state === 'suspended') { audioContext.resume(); } const o = audioContext.createOscillator(), g = audioContext.createGain(); o.connect(g); g.connect(audioContext.destination); switch (type) { case 'click': o.type = 'sine'; o.frequency.setValueAtTime(440, audioContext.currentTime); g.gain.setValueAtTime(0.5, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); break; case 'correct': o.type = 'triangle'; o.frequency.setValueAtTime(523.25, audioContext.currentTime); o.frequency.linearRampToValueAtTime(1046.50, audioContext.currentTime + 0.15); g.gain.setValueAtTime(0.3, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2); break; case 'wrong': o.type = 'square'; o.frequency.setValueAtTime(220, audioContext.currentTime); g.gain.setValueAtTime(0.3, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3); break; case 'tick': o.type = 'sine'; o.frequency.setValueAtTime(880, audioContext.currentTime); g.gain.setValueAtTime(0.2, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1); break; case 'gameOver': o.type = 'sawtooth'; o.frequency.setValueAtTime(440, audioContext.currentTime); o.frequency.linearRampToValueAtTime(220, audioContext.currentTime + 0.5); g.gain.setValueAtTime(0.4, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5); break; } o.start(); o.stop(audioContext.currentTime + 0.5); }
    function populateStudentIds() { for (let i = 1; i <= 25; i++) { const option = document.createElement('option'); option.value = i; option.textContent = i; studentIdSelect.appendChild(option); } }
    function handleLogin() { const className = classSelect.value; const studentId = studentIdSelect.value; if (!className || !studentId) { loginError.textContent = '請選擇班別和學號！'; return; } currentUser = { class: className, id: studentId }; loginError.textContent = ''; playSound('click'); loginScreen.classList.add('hidden'); instructionScreen.classList.remove('hidden'); }
    function startGame() { playSound('click'); instructionScreen.classList.add('hidden'); endScreen.classList.add('hidden'); gameMainInterface.style.display = 'flex'; score = 0; timer = TOTAL_TIME; updateStatus(); generateQuestion(); clearInterval(timerInterval); timerInterval = setInterval(() => { timer--; updateStatus(); if (timer <= 5 && timer > 0) playSound('tick'); if (timer <= 0) endGame(); }, 1000); }
    function endGame() { clearInterval(timerInterval); playSound('gameOver'); gameMainInterface.style.display = 'none'; const correctAnswers = score / 10; endMessage.innerHTML = `你在 ${TOTAL_TIME} 秒內答對了 ${correctAnswers} 題，<br>總分是 ${score}！`; saveScore(currentUser.class, currentUser.id, score); displayLeaderboard(); endScreen.classList.remove('hidden'); }
    function replayGame() { playSound('click'); endScreen.classList.add('hidden'); instructionScreen.classList.remove('hidden'); }
    function updateStatus() { timerDisplay.textContent = `遊戲時間: ${timer}`; scoreDisplay.textContent = `分數: ${score}`; }
    function saveScore(className, studentId, score) { const leaderboard = getLeaderboard(), playerIndex = leaderboard.findIndex(p => p.class === className && p.id === studentId); if (playerIndex > -1) { if (score > leaderboard[playerIndex].score) { leaderboard[playerIndex].score = score; } } else { leaderboard.push({ class: className, id: studentId, score: score }); } localStorage.setItem('mathGameLeaderboard', JSON.stringify(leaderboard)); }
    function getLeaderboard() { const data = localStorage.getItem('mathGameLeaderboard'); return (data ? JSON.parse(data) : []).sort((a, b) => b.score - a.score); }
    function displayLeaderboard() { const leaderboard = getLeaderboard(); let html = '<table class="leaderboard"><thead><tr><th>排名</th><th>班別</th><th>學號</th><th>分數</th></tr></thead><tbody>'; if (leaderboard.length === 0) { html += '<tr><td colspan="4">暫無記錄</td></tr>'; } else { leaderboard.forEach((player, index) => { const isCurrentUser = player.class === currentUser.class && player.id === currentUser.id; html += `<tr class="${isCurrentUser ? 'current-player' : ''}"><td>${index + 1}</td><td>${player.class}</td><td>${player.id}</td><td>${player.score}</td></tr>`; }); } html += '</tbody></table>'; leaderboardContainer.innerHTML = html; }


    // --- 7. 題目與拖放邏輯 (*** 版本 2.2 改良 ***) ---
    let draggedElement = null;
    let isChecking = false; // 新增狀態鎖，防止重複觸發

    function showFeedback(isCorrect) {
        feedbackIcon.textContent = isCorrect ? '✓' : '✗';
        feedbackIcon.className = 'feedback-icon ' + (isCorrect ? 'correct' : 'wrong');
        feedbackOverlay.classList.remove('hidden');
        isChecking = true; // 鎖定

        setTimeout(() => {
            feedbackOverlay.classList.add('hidden');
            if (isCorrect) {
                // 答對，生成新題目
                generateQuestion();
            }
            isChecking = false; // 解鎖
        }, 800); // 顯示 800 毫秒
    }

    function handleDrop(target) {
        if (isChecking) return; // 如果正在顯示回饋，則不處理

        const cell = target ? target.closest('.grid-cell') : null;
        const isAnswerCorrect = cell && !cell.hasChildNodes() && checkAnswer(cell);

        if (isAnswerCorrect) {
            playSound('correct');
            score += 10;
            updateStatus();
            // 複製 emoji 到格子中，並移除可拖動的 emoji
            const tempEmoji = draggedElement.cloneNode(true);
            tempEmoji.classList.remove('dragging');
            cell.appendChild(tempEmoji);
            if (draggedElement.parentElement) {
                draggedElement.parentElement.removeChild(draggedElement);
            }
            showFeedback(true);
        } else {
            if (draggedElement) {
                playSound('wrong');
                showFeedback(false);
            }
        }
    }
    
    // 其他函數 (與 v2.1 相同，未作修改)
    function generateQuestion() { /* ... */ } function generateSimpleQuestion(question) { /* ... */ } function generateBetweenQuestion(question) { /* ... */ } function renderGrid(gridState, anchorIndices) { /* ... */ } function checkAnswer(droppedCell) { /* ... */ } function handleDragStart(e) { /* ... */ } function handleDragEnd() { /* ... */ } function handleTouchStart(e) { /* ... */ } function handleTouchMove(e) { /* ... */ } function handleTouchEnd(e) { /* ... */ } function createDraggableEmoji(emoji, question) { /* ... */ } function checkAnswerLogic(droppedRow, droppedCol, anchorRow, anchorCol, questionType) { /* ... */ } function getRandomItems(arr, n) { /* ... */ } function shuffleArray(array) { /* ... */ } function isValidAnchorPosition(row, col, type) { /* ... */ }
    // --- 完整實現 (與 v2.1 相同) ---
    function generateQuestion() { gameGrid.innerHTML = ''; draggableContainer.innerHTML = ''; const currentQuestion = QUESTION_TYPES[Math.floor(Math.random() * QUESTION_TYPES.length)]; if (currentQuestion.type === 'between') { generateBetweenQuestion(currentQuestion); } else { generateSimpleQuestion(currentQuestion); } }
    function generateSimpleQuestion(question) { let [subjectEmoji, anchorEmoji] = getRandomItems(TARGET_EMOJIS, 2); let anchorRow, anchorCol, anchorIndex, possibleSolutionCells = []; while (possibleSolutionCells.length === 0) { do { anchorRow = Math.floor(Math.random() * GRID_ROWS); anchorCol = Math.floor(Math.random() * GRID_COLS); } while (!isValidAnchorPosition(anchorRow, anchorCol, question.type)); anchorIndex = anchorRow * GRID_COLS + anchorCol; for (let r = 0; r < GRID_ROWS; r++) for (let c = 0; c < GRID_COLS; c++) if (checkAnswerLogic(r, c, anchorRow, anchorCol, question.type)) possibleSolutionCells.push(r * GRID_COLS + c); } const solutionIndex = possibleSolutionCells[Math.floor(Math.random() * possibleSolutionCells.length)]; let availableSpots = []; for (let i = 0; i < GRID_ROWS * GRID_COLS; i++) if (i !== anchorIndex && i !== solutionIndex) availableSpots.push(i); shuffleArray(availableSpots); const gridState = Array(GRID_ROWS * GRID_COLS).fill(null); gridState[anchorIndex] = anchorEmoji; let distractorCount = Math.floor(Math.random() * 3) + 3; const availableDistractors = getRandomItems(DISTRACTOR_EMOJIS, distractorCount); for (let i = 0; i < distractorCount; i++) { const spot = availableSpots.pop(); if (spot !== undefined) gridState[spot] = availableDistractors[i]; } renderGrid(gridState, [anchorIndex]); if (question.format === 'S_V_O') { instructionText.innerHTML = `<span class="emoji">${subjectEmoji}</span> 在 <span class="emoji">${anchorEmoji}</span> 的${TEXT_MAP[question.type]}`; } else { instructionText.innerHTML = `<span class="emoji">${anchorEmoji}</span> 的${TEXT_MAP[question.type]}是 <span class="emoji">${subjectEmoji}</span>`; } const draggableEmoji = createDraggableEmoji(subjectEmoji, question); draggableContainer.appendChild(draggableEmoji); }
    function generateBetweenQuestion(question) { let [subjectEmoji, anchorEmoji1, anchorEmoji2] = getRandomItems(TARGET_EMOJIS, 3); const isVertical = Math.random() < 0.5; let anchor1Pos, anchor2Pos, solutionPos; let foundSpot = false; while (!foundSpot) { const startRow = Math.floor(Math.random() * GRID_ROWS); const startCol = Math.floor(Math.random() * GRID_COLS); if (isVertical) { if (startRow + 2 < GRID_ROWS) { anchor1Pos = { r: startRow, c: startCol }; solutionPos = { r: startRow + 1, c: startCol }; anchor2Pos = { r: startRow + 2, c: startCol }; foundSpot = true; } } else { if (startCol + 2 < GRID_COLS) { anchor1Pos = { r: startRow, c: startCol }; solutionPos = { r: startRow, c: startCol + 1 }; anchor2Pos = { r: startRow, c: startCol + 2 }; foundSpot = true; } } } const anchor1Index = anchor1Pos.r * GRID_COLS + anchor1Pos.c; const anchor2Index = anchor2Pos.r * GRID_COLS + anchor2Pos.c; const solutionIndex = solutionPos.r * GRID_COLS + solutionPos.c; let availableSpots = []; for (let i = 0; i < GRID_ROWS * GRID_COLS; i++) if (i !== anchor1Index && i !== anchor2Index && i !== solutionIndex) availableSpots.push(i); shuffleArray(availableSpots); const gridState = Array(GRID_ROWS * GRID_COLS).fill(null); gridState[anchor1Index] = anchorEmoji1; gridState[anchor2Index] = anchorEmoji2; let distractorCount = Math.floor(Math.random() * 2) + 2; const availableDistractors = getRandomItems(DISTRACTOR_EMOJIS, distractorCount); for (let i = 0; i < distractorCount; i++) { const spot = availableSpots.pop(); if (spot !== undefined) gridState[spot] = availableDistractors[i]; } renderGrid(gridState, [anchor1Index, anchor2Index]); instructionText.innerHTML = `<span class="emoji">${subjectEmoji}</span> 在 <span class="emoji">${anchorEmoji1}</span> 和 <span class="emoji">${anchorEmoji2}</span> 之間`; const draggableEmoji = createDraggableEmoji(subjectEmoji, question); draggableContainer.appendChild(draggableEmoji); }
    function renderGrid(gridState, anchorIndices) { for (let i = 0; i < gridState.length; i++) { const cell = document.createElement('div'); cell.classList.add('grid-cell'); cell.dataset.row = Math.floor(i / GRID_COLS); cell.dataset.col = i % GRID_COLS; if (gridState[i]) { const emojiSpan = document.createElement('span'); emojiSpan.classList.add('emoji', 'immobile'); emojiSpan.textContent = gridState[i]; if (anchorIndices.includes(i)) cell.dataset.anchor = "true"; cell.appendChild(emojiSpan); } gameGrid.appendChild(cell); } }
    function checkAnswer(droppedCell) { if (!draggedElement) return false; const questionType = draggedElement.dataset.questionType; const droppedRow = parseInt(droppedCell.dataset.row), droppedCol = parseInt(droppedCell.dataset.col); const anchorCells = gameGrid.querySelectorAll('.grid-cell[data-anchor="true"]'); if (anchorCells.length === 0) return false; if (questionType === 'between') { const anchor1 = anchorCells[0], anchor2 = anchorCells[1]; const r1 = parseInt(anchor1.dataset.row), c1 = parseInt(anchor1.dataset.col); const r2 = parseInt(anchor2.dataset.row), c2 = parseInt(anchor2.dataset.col); if (c1 === c2) return droppedCol === c1 && droppedRow > Math.min(r1, r2) && droppedRow < Math.max(r1, r2); if (r1 === r2) return droppedRow === r1 && droppedCol > Math.min(c1, c2) && droppedCol < Math.max(c1, c2); } else { const anchorRow = parseInt(anchorCells[0].dataset.row), anchorCol = parseInt(anchorCells[0].dataset.col); return checkAnswerLogic(droppedRow, droppedCol, anchorRow, anchorCol, questionType); } return false; }
    function handleDragStart(e) { if (isChecking) { e.preventDefault(); return; } draggedElement = e.target; setTimeout(() => { if (draggedElement) draggedElement.style.visibility = 'hidden'; }, 0); }
    function handleDragEnd() { if (draggedElement) { draggedElement.style.visibility = 'visible'; } draggedElement = null; }
    function handleTouchStart(e) { if (isChecking) { e.preventDefault(); return; } e.preventDefault(); draggedElement = e.target; draggedElement.classList.add('dragging'); draggedElement.style.position = 'absolute'; draggedElement.style.pointerEvents = 'none'; document.addEventListener('touchmove', handleTouchMove, { passive: false }); document.addEventListener('touchend', handleTouchEnd); handleTouchMove(e); }
    function handleTouchMove(e) { e.preventDefault(); if (!draggedElement) return; const touch = e.touches[0]; draggedElement.style.left = (touch.pageX - draggedElement.offsetWidth / 2) + 'px'; draggedElement.style.top = (touch.pageY - draggedElement.offsetHeight / 2) + 'px'; }
    function handleTouchEnd(e) { if (!draggedElement) return; draggedElement.style.visibility = 'hidden'; const dropTarget = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY); handleDrop(dropTarget); draggedElement.style.position = ''; draggedElement.style.left = ''; draggedElement.style.top = ''; draggedElement.style.pointerEvents = 'auto'; draggedElement.style.visibility = 'visible'; draggedElement.classList.remove('dragging'); document.removeEventListener('touchmove', handleTouchMove); document.removeEventListener('touchend', handleTouchEnd); draggedElement = null; }
    function createDraggableEmoji(emoji, question) { const element = document.createElement('span'); element.textContent = emoji; element.classList.add('emoji'); element.draggable = true; element.dataset.questionType = question.type; element.addEventListener('dragstart', handleDragStart); element.addEventListener('touchstart', handleTouchStart, { passive: false }); return element; }
    function checkAnswerLogic(droppedRow, droppedCol, anchorRow, anchorCol, questionType) { switch (questionType) { case 'above': return droppedCol === anchorCol && droppedRow < anchorRow; case 'below': return droppedCol === anchorCol && droppedRow > anchorRow; case 'left': return droppedRow === anchorRow && droppedCol < anchorCol; case 'right': return droppedRow === anchorRow && droppedCol > anchorCol; default: return false; } }
    function getRandomItems(arr, n) { const shuffled = [...arr].sort(() => 0.5 - Math.random()); return shuffled.slice(0, n); }
    function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[array[i], array[j]] = [array[j], array[i]]; } }
    function isValidAnchorPosition(row, col, type) { switch (type) { case 'above': return row > 0; case 'below': return row < GRID_ROWS - 1; case 'left': return col > 0; case 'right': return col < GRID_COLS - 1; default: return true; } }

    // 8. 事件綁定
    document.addEventListener('DOMContentLoaded', populateStudentIds);
    gameGrid.addEventListener('dragover', e => e.preventDefault());
    gameGrid.addEventListener('drop', e => { e.preventDefault(); handleDrop(e.target); handleDragEnd(); });
    loginButton.addEventListener('click', handleLogin);
    readyButton.addEventListener('click', startGame);
    replayButton.addEventListener('click', replayGame);
    </script>
